server {
    listen       80;
    listen  [::]:80;

    server_tokens off;
    access_log    off;

    location / {
        root   /etc/share/nginx/html;
        index  index.html;
        # Most files will be served from their default location however during deployment,
        # we may need to fallback to a previous version to ensure continuity and be able to
        # support delayed or partial loading of assets served by previous versions of the code
        try_files $uri $uri/ @fallback;

        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=2592000; includeSubDomains";

        # redirect server error pages to the static page /50x.html
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root   /etc/share/nginx/html;
        }
    }
    # This location is copied during the init process from the previously deployed version
    # In development environments it may be left blank safely
    location @fallback {
        root /usr/share/nginx/old_html;
        try_files $uri $uri/ =404;
    }

    gzip on;
    gzip_disable "msie6";

    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;
}
